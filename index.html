<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heather.quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0b16;
    --surface: #1a1528;
    --border: #3a2f5a;
    --text: #f0e6ff;
    --muted: #9b8ec4;
    --accent: #c084fc;
    --accent2: #f0abfc;
    --gold: #fcd34d;
    --pink: #f472b6;
    --teal: #5eead4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--max-op, 0.6); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.8s ease both;
  }

  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 700;
    color: var(--accent2);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  .header .subtitle {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    animation: fadeIn 0.5s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene-tag {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.7;
  }

  .scene-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .scene-text em {
    color: var(--gold);
    font-style: italic;
  }

  .scene-text strong {
    color: var(--accent2);
    font-style: normal;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0.85rem 1.25rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    line-height: 1.5;
  }

  .choice-btn:hover {
    border-color: var(--accent);
    background: rgba(192, 132, 252, 0.08);
    color: var(--accent2);
    transform: translateX(4px);
  }

  .choice-btn:active {
    transform: translateX(2px) scale(0.99);
  }

  .choice-btn .arrow {
    color: var(--accent);
    margin-right: 8px;
  }

  .ending-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }

  .ending-badge.good {
    background: rgba(240, 171, 252, 0.15);
    color: var(--accent2);
    border: 1px solid rgba(240, 171, 252, 0.3);
  }

  .ending-badge.best {
    background: rgba(252, 211, 77, 0.15);
    color: var(--gold);
    border: 1px solid rgba(252, 211, 77, 0.3);
  }

  .ending-badge.chaos {
    background: rgba(244, 114, 182, 0.15);
    color: var(--pink);
    border: 1px solid rgba(244, 114, 182, 0.3);
  }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .restart-btn:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  .progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2rem;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .progress-dots {
    display: flex;
    gap: 4px;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .progress-dot.active {
    background: var(--accent);
  }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 11px;
    color: var(--muted);
    animation: fadeIn 1s 0.5s ease both;
    opacity: 0;
  }

  .footer span { color: var(--pink); }

  .music-toggle {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
    opacity: 0.7;
  }
  .music-toggle:hover { opacity: 1; border-color: var(--accent); }

  .cake-area {
    text-align: center;
    margin-top: 2rem;
    animation: fadeIn 0.8s ease both;
  }
  .cake-area svg { max-width: 260px; width: 100%; }

  .blow-btn {
    display: inline-block;
    margin-top: 1.25rem;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .blow-btn:hover { background: rgba(252,211,77,0.08); }

  .blow-listening {
    margin-top: 1rem;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    animation: pulse 1.2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall var(--dur) var(--delay) ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="scene" id="scene-box"></div>

  <div class="footer">made with love by craig <span>&#9829;</span></div>

  <div style="text-align:center; margin-top: 1.25rem; display: flex; justify-content: center; gap: 1.5rem; animation: fadeIn 1s 1s ease both; opacity: 0;">
    <a href="/shoto" style="font-family:'DM Mono',monospace; font-size:11px; color: var(--muted); text-decoration:none; letter-spacing:0.1em; transition: color 0.2s;" onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--muted)'">🐾 a word from shoto</a>

  </div>
</div>

  birdapp: {
    tag: "chapter one - the daily ritual",
    text: `You open Finch. Your bird has needs. Your bird <em>always</em> has needs. You tend to them with the focus of someone managing a small but emotionally demanding portfolio.\n\nCraig is still asleep. Shoto has woken up and migrated from his dog bed to sitting directly beside you, doing his patient waiting thing.\n\nYou finish your bird duties. You set the phone down. You feel, inexplicably, like you've accomplished something.\n\nShoto looks up at you. Today he is wearing the little outfit. You put it on him last night because you knew it would make the morning better, and you were right, and you are always right about Shoto.`,

    text: `"You want Starbucks?"\n\nCraig makes a noise that is technically a response but not really an answer.\n\n"I'm fine," he says, from somewhere under a pillow.\n\nYou stand there for a moment.\n\n"I do get it on the weekends sometimes," he adds, unprompted, as though this has been weighing on him.\n\nYou leave.`,

    tag: "chapter two - the temple",
    text: `You get your drink. It is correct. It is always correct when you order it because you know exactly what you want, which is a skill more people should have.\n\nYou sit for a second. Or maybe you're already at the drive-through. Either way there is a moment here - a still point, just you and your drink and your birthday morning and nobody needing anything from you for like four consecutive minutes.\n\nYour phone buzzes. It is, in some capacity, work-adjacent.\n\nYou look at it. You know you're going to look at it. You've always known you're going to look at it.`,

let depth = 0;
let audioUnlocked = false;
let isMuted = true;
const bgm = document.getElementById('bgm');
bgm.volume = 0.35;

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (isMuted) {
    bgm.play().catch(()=>{});
    isMuted = false;
    btn.textContent = '🔊';
  } else {
    bgm.pause();
    isMuted = true;
    btn.textContent = '🎵';
  }
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  bgm.play().then(() => {
    isMuted = false;
    document.getElementById('music-btn').textContent = '🔊';
  }).catch(()=>{});
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('click', unlockAudio);

function setDots(n) {
  const dots = document.querySelectorAll('.progress-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i <= n));
}

function cakeLitSVG() {
  const candles = [];
  const positions = [60,90,120,150,200,230,260];
  const colors = ['#f472b6','#c084fc','#fcd34d','#5eead4','#f472b6','#fcd34d','#c084fc'];
  positions.forEach((x, i) => {
    candles.push(`
      <rect x="${x-4}" y="90" width="8" height="28" rx="2" fill="${colors[i]}" opacity="0.9"/>
      <ellipse cx="${x}" cy="86" rx="5" ry="8" fill="#fcd34d" opacity="0.9" class="flame-${i}">
        <animate attributeName="ry" values="8;10;7;9;8" dur="${0.4+i*0.07}s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="86;84;87;85;86" dur="${0.4+i*0.07}s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="${x}" cy="88" rx="3" ry="5" fill="#fff" opacity="0.5">
        <animate attributeName="ry" values="5;7;4;6;5" dur="${0.4+i*0.07}s" repeatCount="indefinite"/>
      </ellipse>
    `);
  });
  return `<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
    ${candles.join('')}
    <rect x="20" y="118" width="280" height="50" rx="8" fill="#c084fc" opacity="0.85"/>
    <rect x="20" y="118" width="280" height="16" rx="0" fill="#a855f7" opacity="0.5"/>
    <rect x="10" y="165" width="300" height="48" rx="10" fill="#f0abfc" opacity="0.9"/>
    <rect x="10" y="165" width="300" height="14" rx="0" fill="#e879f9" opacity="0.5"/>
    <text x="160" y="197" text-anchor="middle" font-family="Playfair Display, serif" font-size="15" fill="#4a1c6e" font-style="italic">happy birthday heather</text>
    <text x="160" y="148" text-anchor="middle" font-family="DM Mono, monospace" font-size="11" fill="#f0e6ff" opacity="0.8">36</text>
  </svg>`;
}

function cakeBlownSVG() {
  const candles = [];
  const positions = [60,90,120,150,200,230,260];
  const colors = ['#f472b6','#c084fc','#fcd34d','#5eead4','#f472b6','#fcd34d','#c084fc'];
  positions.forEach((x, i) => {
    candles.push(`
      <rect x="${x-4}" y="90" width="8" height="28" rx="2" fill="${colors[i]}" opacity="0.7"/>
      <path d="M${x} 85 Q${x+4} 78 ${x+2} 70 Q${x+6} 63 ${x} 58" stroke="#9b8ec4" stroke-width="1.5" fill="none" opacity="0.6">
        <animate attributeName="d" values="M${x} 85 Q${x+4} 78 ${x+2} 70 Q${x+6} 63 ${x} 58;M${x} 85 Q${x-3} 77 ${x+1} 69 Q${x-2} 62 ${x+2} 57;M${x} 85 Q${x+4} 78 ${x+2} 70 Q${x+6} 63 ${x} 58" dur="1s" repeatCount="indefinite"/>
      </path>
    `);
  });
  return `<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
    ${candles.join('')}
    <rect x="20" y="118" width="280" height="50" rx="8" fill="#c084fc" opacity="0.85"/>
    <rect x="20" y="118" width="280" height="16" rx="0" fill="#a855f7" opacity="0.5"/>
    <rect x="10" y="165" width="300" height="48" rx="10" fill="#f0abfc" opacity="0.9"/>
    <rect x="10" y="165" width="300" height="14" rx="0" fill="#e879f9" opacity="0.5"/>
    <text x="160" y="197" text-anchor="middle" font-family="Playfair Display, serif" font-size="15" fill="#4a1c6e" font-style="italic">happy birthday heather</text>
    <text x="160" y="148" text-anchor="middle" font-family="DM Mono, monospace" font-size="11" fill="#f0e6ff" opacity="0.8">36</text>
  </svg>`;
}

function launchConfetti() {
  const colors = ['#f472b6','#c084fc','#fcd34d','#5eead4','#f0abfc','#fcd34d'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      --dur: ${1.5 + Math.random()*2}s;
      --delay: ${Math.random()*1.2}s;
      transform: rotate(${Math.random()*360}deg);
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

function startBlowDetection() {
  const statusEl = document.getElementById('blow-status');
  const cakeEl = document.getElementById('cake-svg');
  statusEl.textContent = '🎤 listening... give it a good blow';

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    let blowFrames = 0;

    function check() {
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b) => a+b, 0) / data.length;
      if (avg > 28) {
        blowFrames++;
        if (blowFrames > 10) {
          stream.getTracks().forEach(t => t.stop());
          ctx.close();
          cakeEl.innerHTML = cakeBlownSVG();
          statusEl.textContent = '🎉 make a wish!';
          launchConfetti();
          return;
        }
      } else {
        blowFrames = Math.max(0, blowFrames - 1);
      }
      requestAnimationFrame(check);
    }
    check();
  }).catch(() => {
    statusEl.textContent = 'mic not available - just pretend you blew them out 💨';
    setTimeout(() => {
      document.getElementById('cake-svg').innerHTML = cakeBlownSVG();
      launchConfetti();
    }, 1800);
  });
}

function goto(id) {
  const scene = SCENES[id];
  if (!scene) return;
  const box = document.getElementById('scene-box');

  depth = Math.min(depth + 1, 5);
  setDots(depth);

  let html = `<div class="scene-tag">${scene.tag}</div>`;

  if (scene.badge) {
    html += `<div class="ending-badge ${scene.badge}">${scene.badgeLabel}</div>`;
  }

  const paras = scene.text.split('\n\n');
  html += `<div class="scene-text">${paras.map(p => `<p style="margin-bottom:1rem">${p.replace(/\n/g,'<br>')}</p>`).join('')}</div>`;

  if (scene.choices && scene.choices.length > 0) {
    html += `<div class="choices">`;
    scene.choices.forEach(c => {
      html += `<button class="choice-btn" onclick="goto('${c.next}')"><span class="arrow">&rsaquo;</span>${c.label}</button>`;
    });
    html += `</div>`;
  } else if (scene.cake) {
    html += `<div class="cake-area">
      <div id="cake-svg">${cakeLitSVG()}</div>
      <button class="blow-btn" onclick="this.style.display='none';startBlowDetection()">🎂 blow out the candles</button>
      <div class="blow-listening" id="blow-status" style="display:none"></div>
    </div>
    <button class="restart-btn" onclick="restart()" style="margin-top:1.5rem">&#8635; play again</button>`;
    setTimeout(() => {
      document.querySelector('.blow-btn')?.addEventListener('click', function() {
        document.getElementById('blow-status').style.display = 'block';
      });
    }, 100);
  } else {
    html += `<button class="restart-btn" onclick="restart()">&#8635; play again</button>`;
  }

  box.innerHTML = html;
  box.style.animation = 'none';
  box.offsetHeight;
  box.style.animation = 'fadeIn 0.4s ease both';
}

function restart() {
  depth = 0;
  setDots(0);
  goto('start');
}

function makeStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --d: ${2 + Math.random()*4}s;
      --delay: ${Math.random()*5}s;
      --max-op: ${0.3 + Math.random()*0.6};
      width: ${Math.random() > 0.8 ? 3 : 2}px;
      height: ${Math.random() > 0.8 ? 3 : 2}px;
    `;
    container.appendChild(s);
  }
}

makeStars();
goto('start');
</script>
